# docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Works identically in QA (Contabo, Singapore) and PROD (Oracle Cloud, Mumbai).
# All environment-specific values come from the server-side .env file.
#
# Services:
#   backend  — Flask/Gunicorn application
#   caddy    — Reverse proxy with automatic HTTPS
#
# The backend port (5000) is intentionally NOT published to the host.
# All public traffic enters through Caddy on ports 80 and 443.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  proxy_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  uploads_data:

services:

  # ── Flask/Gunicorn application ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ss-jewellery-backend:latest
    container_name: ss_jewellery_backend
    restart: unless-stopped
    networks:
      - proxy_net
    # The Python port is intentionally NOT published to the host.
    # Traffic reaches the app only through the Caddy reverse proxy.
    expose:
      - "${PORT:-5000}"
    env_file:
      - .env
    environment:
      # Ensure Python output goes to Docker logs even if .env is absent
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      # Set FLASK_APP so flask db commands work in docker compose run
      FLASK_APP: "backend.app"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${PORT:-5000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      # Persist uploaded media outside the container so it survives rebuilds.
      # The upload directory is excluded from the Docker image via .dockerignore.
      - uploads_data:/app/backend/static/uploads

  # ── Caddy reverse proxy ────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: ss_jewellery_caddy
    restart: unless-stopped
    networks:
      - proxy_net
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"    # HTTP/3 (QUIC)
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
