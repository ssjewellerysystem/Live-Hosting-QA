name: Deploy to PROD

# ─────────────────────────────────────────────────────────────────────────────
# This file belongs in the PROD repository at:
#   .github/workflows/deploy-prod.yml
#
# DO NOT commit this file to the QA repository — it is placed here only so the
# "Promote QA to PROD" workflow can restore it after rsync.  The promote
# workflow explicitly restores this file from PROD git history after rsync.
#
# Triggered automatically when the "Promote QA to PROD" workflow pushes to
# the PROD main branch, or manually via workflow_dispatch.
#
# Required PROD repository secrets:
#   PROD_HOST             — Oracle Cloud instance IP or hostname
#   PROD_USER             — SSH username (deploy)
#   PROD_SSH_PRIVATE_KEY  — Private key content (different from QA key)
#   PROD_SSH_KNOWN_HOSTS  — Output of: ssh-keyscan <PROD_HOST>
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent concurrent production deployments
concurrency:
  group: deploy-prod
  cancel-in-progress: false

# Minimum required permissions
permissions:
  contents: read

jobs:
  # ── Job 1: Run backend tests ───────────────────────────────────────────────
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/base.txt

      - name: Install dependencies
        run: pip install -r requirements/base.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-key-not-real-do-not-use"
          FLASK_APP: "backend.app"
          APP_ENV: "test"
          DEBUG: "false"
          CORS_ALLOWED_ORIGINS: "http://localhost:5173"
        run: |
          if [ -d tests ] && ls tests/test_*.py &>/dev/null 2>&1; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No test files found – skipping pytest."
          fi

  # ── Job 2: Deploy to Oracle Cloud PROD server ─────────────────────────────
  deploy:
    name: Deploy to PROD Server
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code (for commit SHA)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Print commit being deployed
        run: |
          echo "Deploying PROD commit: $(git rev-parse HEAD)"
          echo "Commit message:        $(git log -1 --pretty=%s)"
          echo "Triggered by:          ${{ github.event_name }}"

      - name: Install SSH client
        run: sudo apt-get install -y openssh-client

      - name: Configure SSH key and known_hosts
        run: |
          mkdir -p ~/.ssh
          # Write private key — never log or echo the key content
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Write pre-verified host fingerprint — prevents MITM attacks
          printf '%s\n' "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run deployment script on PROD server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
              "bash /opt/mybackend/deploy/deploy.sh"

      - name: Clean up SSH key
        # Always remove the key from the runner, even if the deploy step fails
        if: always()
        run: rm -f ~/.ssh/deploy_key
