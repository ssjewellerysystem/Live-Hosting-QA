name: Deploy to QA

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent two QA deployments from running simultaneously.
# The second run is queued rather than cancelled so no deployment is lost.
concurrency:
  group: deploy-qa
  cancel-in-progress: false

# Minimum required GitHub token permissions
permissions:
  contents: read

jobs:
  # ── Job 1: Run backend tests ───────────────────────────────────────────────
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/base.txt

      - name: Install dependencies
        run: pip install -r requirements/base.txt

      - name: Run tests
        env:
          # Provide a minimal config so Flask can import without a real database.
          # The health test and import tests do not require Neon credentials.
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-key-not-real-do-not-use"
          FLASK_APP: "backend.app"
          APP_ENV: "test"
          DEBUG: "false"
          CORS_ALLOWED_ORIGINS: "http://localhost:5173"
        run: |
          if [ -d tests ] && ls tests/test_*.py &>/dev/null 2>&1; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No test files found – skipping pytest."
          fi

  # ── Job 2: Deploy to the QA Contabo server ────────────────────────────────
  deploy:
    name: Deploy to QA Server
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Print commit being deployed
        run: |
          echo "Deploying commit: ${{ github.sha }}"
          echo "Triggered by:     ${{ github.event_name }}"
          echo "Branch:           ${{ github.ref_name }}"

      - name: Install SSH client
        run: sudo apt-get install -y openssh-client

      - name: Configure SSH key and known_hosts
        run: |
          mkdir -p ~/.ssh
          # Write private key with strict permissions (never log or echo the key)
          printf '%s\n' "${{ secrets.QA_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Write pre-verified host fingerprint — prevents MITM attacks
          printf '%s\n' "${{ secrets.QA_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run deployment script on QA server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              "${{ secrets.QA_USER }}@${{ secrets.QA_HOST }}" \
              "bash /opt/mybackend/deploy/deploy.sh"

      - name: Clean up SSH key
        # Always remove the key from the runner, even if the deploy step fails
        if: always()
        run: rm -f ~/.ssh/deploy_key
